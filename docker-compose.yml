services:
  main-api:
    build: .
    container_name: main-api
    restart: unless-stopped
    environment:
      MONGO_URI: ${MONGO_URI}
      PORT: ${PORT:-5195}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET}
      ADMIN_COOKIE_SECURE: ${ADMIN_COOKIE_SECURE:-false}
      ADMIN_API_TOKEN: ${ADMIN_API_TOKEN}
      APP_ID: ${APP_ID:-main}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SSL: ${SMTP_SSL:-true}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-NIAMI}
      PASSWORD_RESET_SECRET: ${PASSWORD_RESET_SECRET}
      PASSWORD_RESET_CODE_TTL_MINUTES: ${PASSWORD_RESET_CODE_TTL_MINUTES:-15}
      PASSWORD_RESET_MIN_INTERVAL_SECONDS: ${PASSWORD_RESET_MIN_INTERVAL_SECONDS:-60}
      TBANK_API_BASE_URL: ${TBANK_API_BASE_URL}
      TBANK_TERMINAL_KEY: ${TBANK_TERMINAL_KEY}
      TBANK_PASSWORD: ${TBANK_PASSWORD}
      TBANK_GDZ_TERMINAL_KEY: ${TBANK_GDZ_TERMINAL_KEY:-}
      TBANK_GDZ_PASSWORD: ${TBANK_GDZ_PASSWORD:-}
      TBANK_MED_APP_TERMINAL_KEY: ${TBANK_MED_APP_TERMINAL_KEY:-}
      TBANK_MED_APP_PASSWORD: ${TBANK_MED_APP_PASSWORD:-}
      TBANK_PAYMENT_SCHEME: ${TBANK_PAYMENT_SCHEME}
      TBANK_PAYMENT_RETURN_BASE_URL: ${TBANK_PAYMENT_RETURN_BASE_URL}
      TBANK_NOTIFICATION_URL: ${TBANK_NOTIFICATION_URL}
      RECURRING_SUBSCRIPTION_JOB_ENABLED: ${RECURRING_SUBSCRIPTION_JOB_ENABLED:-true}
      TBANK_RECEIPT_TAXATION: ${TBANK_RECEIPT_TAXATION}
      TBANK_RECEIPT_TAX: ${TBANK_RECEIPT_TAX}
      TBANK_RECEIPT_PAYMENT_METHOD: ${TBANK_RECEIPT_PAYMENT_METHOD}
      TBANK_RECEIPT_PAYMENT_OBJECT: ${TBANK_RECEIPT_PAYMENT_OBJECT}
      TBANK_RECEIPT_ITEM_NAME: ${TBANK_RECEIPT_ITEM_NAME}
    ports:
      - "${MAIN_API_HOST_PORT:-5195}:5195"
    networks:
      - kirill_backend_net

networks:
  kirill_backend_net:
    external: true
